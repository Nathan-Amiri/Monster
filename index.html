<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mixer Pad</title>
<style>
  :root { 
    --bg: #0b0c14; 
  }
  
  * { box-sizing: border-box; }
  
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  
  #stage {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    padding: 20px;
  }
  
  #grid {
    display: grid;
    /* More human/flexible approach: auto-fit columns instead of hardcoding a 5x3 wall */
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }
  
  .pad {
    background: var(--pad-color);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    color: #fff;
    text-transform: uppercase;
    aspect-ratio: 4 / 3;
    transition: all 0.1s ease;
    /* Clean humantype approach: opacity/brightness control for inactive state */
    opacity: 0.4;
    filter: grayscale(30%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
  }
  
  .pad:active { 
    transform: scale(0.95); 
  }
  
  .pad.on {
    opacity: 1;
    filter: none;
    box-shadow: 0 0 20px var(--glow-color), inset 0 0 0 1px rgba(255,255,255,0.3);
  }
  
  #status {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    text-align: center;
    color: #656874;
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="grid"></div>
</div>
<div id="status"></div>

<script>
// Cleaned up dataset with consolidated naming & standard HEX/RGBA strings
const TRACKS = [
  { file: "audio/heavy.wav",   label: "Heavy",   color: "#661414", glow: "rgba(255, 0, 0, 0.5)" },
  { file: "audio/light.wav",   label: "Light",   color: "#751a1a", glow: "rgba(255, 30, 30, 0.5)" },
  { file: "audio/pong.wav",    label: "Pong",    color: "#872020", glow: "rgba(255, 60, 60, 0.5)" },
  { file: "audio/swish.wav",   label: "Swish",   color: "#992626", glow: "rgba(255, 90, 90, 0.5)" },
  { file: "audio/tom.wav",     label: "Tom",     color: "#aa2c2c", glow: "rgba(255, 120, 120, 0.5)" },

  { file: "audio/low.wav",     label: "Low",     color: "#403366", glow: "rgba(135, 90, 255, 0.5)" },
  { file: "audio/rumble.wav",  label: "Rumble",  color: "#4f3e80", glow: "rgba(155, 110, 255, 0.5)" },
  { file: "audio/groove.wav",  label: "Groove",  color: "#5d4999", glow: "rgba(175, 130, 255, 0.5)" },
  { file: "audio/fae.wav",     label: "Fae",     color: "#316973", glow: "rgba(50, 210, 240, 0.5)" },
  { file: "audio/flute.wav",   label: "Flute",   color: "#387885", glow: "rgba(80, 230, 255, 0.5)" },

  { file: "audio/bell.wav",    label: "Bell",    color: "#436d2b", glow: "rgba(110, 230, 70, 0.5)" },
  { file: "audio/candy.wav",   label: "Candy",   color: "#4d7d32", glow: "rgba(130, 250, 90, 0.5)" },
  { file: "audio/ice.wav",     label: "Ice",     color: "#578c38", glow: "rgba(140, 255, 100, 0.5)" },
  { file: "audio/angel.wav",   label: "Angel",   color: "#619c3e", glow: "rgba(160, 255, 120, 0.5)" },
  { file: "audio/crystal.wav", label: "Crystal", color: "#6bac44", glow: "rgba(180, 255, 140, 0.5)" },
];

const grid = document.getElementById('grid');
const status = document.getElementById('status');
const pads = [];

let audioCtx = null;
let isInitialized = false;

// Initialize layout
TRACKS.forEach((track, index) => {
  const btn = document.createElement('button');
  btn.className = 'pad';
  btn.textContent = track.label;
  btn.style.setProperty('--pad-color', track.color);
  btn.style.setProperty('--glow-color', track.glow);
  btn.addEventListener('click', () => togglePad(index));
  
  grid.appendChild(btn);
  pads.push({ el: btn, gainNode: null, isOn: false });
});

async function loadBuffer(url) {
  try {
    const response = await fetch(url);
    if (!response.ok) return null;
    
    const arrayBuffer = await response.arrayBuffer();
    return await audioCtx.decodeAudioData(arrayBuffer);
  } catch (err) {
    return null;
  }
}

async function initAudio() {
  isInitialized = true;
  status.textContent = 'Loading samples...';
  
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  const buffers = await Promise.all(TRACKS.map(t => loadBuffer(t.file)));
  const startTime = audioCtx.currentTime + 0.1;
  let failedCount = 0;

  buffers.forEach((buffer, i) => {
    if (!buffer) {
      failedCount++;
      return;
    }

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;

    source.connect(gainNode).connect(audioCtx.destination);
    source.start(startTime);

    pads[i].gainNode = gainNode;
  });

  status.textContent = failedCount > 0 
    ? `Warning: ${failedCount} tracks failed to load.` 
    : '';
}

async function togglePad(i) {
  if (!isInitialized) {
    await initAudio();
  }
  
  const pad = pads[i];
  pad.isOn = !pad.isOn;
  pad.el.classList.toggle('on', pad.isOn);
  
  if (pad.gainNode) {
    // Smooth volume ramp to prevent clicks
    const targetVolume = pad.isOn ? 1 : 0;
    pad.gainNode.gain.setTargetAtTime(targetVolume, audioCtx.currentTime, 0.02);
  }
}
</script>
</body>
</html>
