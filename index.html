<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mixer</title>
<style>
  :root{ --bg:#0b0c14; }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow:hidden;
  }
  #stage{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    width:100vw;
  }
  #grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap:16px;
    width:min(92vw, 920px);
    aspect-ratio: 5/3;
  }
  .pad{
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-weight:800;
    font-size:clamp(12px,1.5vw,19px);
    letter-spacing:0.5px;
    color:#fff;
    text-transform:uppercase;
    transition: transform 0.08s ease, box-shadow 0.25s ease, filter 0.25s ease;
    filter:saturate(0.3) brightness(0.4);
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    padding:0 8px;
    text-align:center;
  }
  .pad:active{ transform:scale(0.96); }
  .pad.on{
    filter:saturate(0.92) brightness(1);
    box-shadow: 0 0 14px 1px var(--glow), inset 0 0 0 2px rgba(255,255,255,0.35);
  }
  #status{
    position:fixed;
    bottom:14px;
    left:0;
    right:0;
    text-align:center;
    color:#8a8d9c;
    font-size:13px;
    min-height:18px;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="grid"></div>
</div>
<div id="status"></div>

<script>
const TRACKS = [
  { file: "audio/heavy.wav",   label: "Heavy",   color: "hsl(0, 65%, 39%)",  glow: "hsl(0, 72%, 50%)"  },
  { file: "audio/light.wav",   label: "Light",   color: "hsl(0, 65%, 46%)",  glow: "hsl(0, 72%, 57%)"  },
  { file: "audio/pong.wav",    label: "Pong",    color: "hsl(0, 65%, 53%)",  glow: "hsl(0, 72%, 64%)"  },
  { file: "audio/swish.wav",   label: "Swish",   color: "hsl(0, 65%, 60%)",  glow: "hsl(0, 72%, 71%)"  },
  { file: "audio/tom.wav",     label: "Tom",     color: "hsl(0, 65%, 67%)",  glow: "hsl(0, 72%, 78%)"  },

  { file: "audio/low.wav",     label: "Low",     color: "hsl(270, 50%, 40%)", glow: "hsl(270, 62%, 53%)" },
  { file: "audio/rumble.wav",  label: "Rumble",  color: "hsl(270, 50%, 49%)", glow: "hsl(270, 62%, 62%)" },
  { file: "audio/groove.wav",  label: "Groove",  color: "hsl(270, 50%, 58%)", glow: "hsl(270, 62%, 71%)" },
  { file: "audio/fae.wav",     label: "Fae",     color: "hsl(185, 58%, 46%)", glow: "hsl(185, 68%, 57%)" },
  { file: "audio/flute.wav",   label: "Flute",   color: "hsl(185, 58%, 52%)", glow: "hsl(185, 68%, 64%)" },

  { file: "audio/bell.wav",    label: "Bell",    color: "hsl(95, 55%, 44%)", glow: "hsl(95, 65%, 55%)" },
  { file: "audio/candy.wav",   label: "Candy",   color: "hsl(95, 55%, 50%)", glow: "hsl(95, 65%, 61%)" },
  { file: "audio/ice.wav",     label: "Ice",     color: "hsl(95, 55%, 56%)", glow: "hsl(95, 65%, 67%)" },
  { file: "audio/angel.wav",   label: "Angel",   color: "hsl(95, 55%, 62%)", glow: "hsl(95, 65%, 73%)" },
  { file: "audio/crystal.wav", label: "Crystal", color: "hsl(95, 55%, 68%)", glow: "hsl(95, 65%, 79%)" },
];

const grid = document.getElementById('grid');
const status = document.getElementById('status');

const pads = [];

TRACKS.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'pad';
  btn.textContent = t.label;
  btn.style.background = t.color;
  btn.style.setProperty('--glow', t.glow);
  btn.addEventListener('click', () => toggle(i));
  grid.appendChild(btn);
  pads.push({ el: btn, gain: null, on: false });
});

let ctx;
let started = false;

async function loadBuffer(file) {
  console.log('[loadBuffer] starting fetch for:', file);
  console.log('[loadBuffer] resolved absolute URL:', new URL(file, window.location.href).href);
  console.log('[loadBuffer] page location.href:', window.location.href);
  console.log('[loadBuffer] page protocol:', window.location.protocol);
  try {
    const res = await fetch(file);
    console.log('[loadBuffer]', file, '-> response received. ok:', res.ok, 'status:', res.status, 'statusText:', res.statusText, 'type:', res.type, 'url:', res.url);
    if (!res.ok) {
      console.log('[loadBuffer]', file, '-> response not ok, throwing');
      throw new Error('missing: ' + res.status);
    }
    const arr = await res.arrayBuffer();
    console.log('[loadBuffer]', file, '-> arrayBuffer received, byteLength:', arr.byteLength);
    if (arr.byteLength === 0) {
      console.log('[loadBuffer]', file, '-> WARNING: byteLength is 0, file is empty or not really downloaded');
    }
    console.log('[loadBuffer]', file, '-> attempting decodeAudioData...');
    const decoded = await ctx.decodeAudioData(arr);
    console.log('[loadBuffer]', file, '-> decodeAudioData SUCCESS. duration:', decoded.duration, 'sampleRate:', decoded.sampleRate, 'numberOfChannels:', decoded.numberOfChannels);
    return decoded;
  } catch (e) {
    console.log('[loadBuffer]', file, '-> CAUGHT ERROR. name:', e.name, 'message:', e.message);
    console.log('[loadBuffer]', file, '-> full error object:', e);
    return null;
  }
}

async function startAll() {
  console.log('[startAll] called. started flag was:', started);
  started = true;
  status.textContent = 'loading...';
  console.log('[startAll] creating AudioContext...');
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  console.log('[startAll] AudioContext created. state:', ctx.state, 'sampleRate:', ctx.sampleRate);
  if (ctx.state === 'suspended') {
    console.log('[startAll] context is suspended, attempting resume()...');
    await ctx.resume();
    console.log('[startAll] after resume(), state is now:', ctx.state);
  }

  console.log('[startAll] TRACKS array being loaded:', JSON.stringify(TRACKS.map(t => t.file)));
  console.log('[startAll] kicking off Promise.all over', TRACKS.length, 'files...');
  const buffers = await Promise.all(TRACKS.map(t => loadBuffer(t.file)));
  console.log('[startAll] Promise.all resolved. results:', buffers.map((b, i) => TRACKS[i].file + ' = ' + (b ? 'LOADED duration ' + b.duration : 'NULL')));

  const startAt = ctx.currentTime + 0.25;
  console.log('[startAll] ctx.currentTime is:', ctx.currentTime, '-> scheduling all sources to start at:', startAt);
  let missing = 0;

  buffers.forEach((buffer, i) => {
    if (!buffer) {
      missing++;
      console.log('[startAll] slot', i, '(' + TRACKS[i].file + ') has no buffer, skipping source creation');
      return;
    }
    console.log('[startAll] slot', i, '(' + TRACKS[i].file + ') creating source + gain node');
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    const gain = ctx.createGain();
    gain.gain.value = 0;

    source.connect(gain).connect(ctx.destination);
    source.start(startAt);
    console.log('[startAll] slot', i, '(' + TRACKS[i].file + ') source.start(' + startAt + ') called successfully');

    pads[i].gain = gain;
  });

  console.log('[startAll] done. missing count:', missing, 'out of', TRACKS.length);
  status.textContent = missing > 0
    ? missing + ' of ' + TRACKS.length + ' tracks did not load — check the audio folder'
    : '';
}

async function toggle(i) {
  console.log('[toggle] pad', i, '(' + TRACKS[i].label + ') clicked. started:', started);
  if (!started) {
    console.log('[toggle] not started yet, calling startAll()');
    await startAll();
    console.log('[toggle] startAll() finished');
  }
  const pad = pads[i];
  pad.on = !pad.on;
  console.log('[toggle] pad', i, 'new on state:', pad.on, '- has gain node:', !!pad.gain);
  pad.el.classList.toggle('on', pad.on);
  if (pad.gain) {
    pad.gain.gain.setTargetAtTime(pad.on ? 1 : 0, ctx.currentTime, 0.015);
    console.log('[toggle] pad', i, 'gain ramped toward', pad.on ? 1 : 0);
  } else {
    console.log('[toggle] pad', i, 'has NO gain node - this pad will stay silent regardless of click');
  }
}
</script>
</body>
</html>
